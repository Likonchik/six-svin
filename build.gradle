plugins {
	id 'java'
	id 'net.neoforged.moddev' version '2.0.141'
	id 'io.freefair.lombok' version '8.6'
}

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

repositories {
	mavenCentral()
	// dev.lavalink.youtube:v2 (standalone youtube-source for Lavaplayer 2.x); lavaplayer itself is on Central.
	maven { url 'https://maven.lavalink.dev/releases' }
}

neoForge {
	version = project.neoforge_version

	// Parchment param-name mappings can be added later via:
	// parchment { mappingsVersion = '...'; minecraftVersion = '1.21.1' }

	runs {
		client {
			client()
			gameDirectory = file('run')
			// разрешить установку SecurityManager в рантайме (RobotGuard: антискринилка vs java.awt.Robot)
			jvmArguments.add('-Djava.security.manager=allow')
		}
	}

	mods {
		exosware {
			sourceSet sourceSets.main
		}
	}
}

dependencies {
	// SOCKS/proxy codecs (were Loom include(...) on Fabric). On compile classpath...
	implementation 'io.netty:netty-handler-proxy:4.1.82.Final'
	implementation 'io.netty:netty-codec-socks:4.1.82.Final'

	// ...and nested into the mod jar via jarJar so they load at runtime. transitive=false: do NOT
	// bundle netty-codec/transport/buffer/common (Minecraft already ships those; 4.1.x is binary-compatible).
	// Pin to 4.1.82 exactly: an older netty module is forward-compatible against MC's newer 4.1.x core
	// (the reverse is not), and this is the version the mod was written and originally shipped against.
	jarJar(group: 'io.netty', name: 'netty-handler-proxy', version: '[4.1.82.Final]') { transitive = false }
	jarJar(group: 'io.netty', name: 'netty-codec-socks', version: '[4.1.82.Final]') { transitive = false }

	// TACZ (Timeless and Classics Zero) gun-mod API — COMPILE-ONLY (runtime-optional: NameTags gun-ESP
	// degrades gracefully via try/catch(NoClassDefFoundError) if TACZ isn't installed). Jar vendored in libs/.
	compileOnly files('libs/tacz-neoforge-1.21.1-1.1.8-hotfix-r1.jar')
	// ...also on the dev-run classpath so TACZ actually loads in `runClient` for testing the gun modules.
	// It self-contains its deps (luaj/simplebedrockmodel/etc via jarJar). NOT bundled into our production jar.
	runtimeOnly files('libs/tacz-neoforge-1.21.1-1.1.8-hotfix-r1.jar')

	// --- MediaPlayer: lavaplayer (resolve+decode YT/YTM/SC/Bandcamp/HTTP/local -> PCM) + standalone
	// youtube-source v2 (Lavaplayer 2.x). MC/NeoForge ALREADY ships Apache HttpClient 4 + commons +
	// slf4j -> excluding those groups is correct (bundling them = split-package crash under defaultRequire=1).
	def lavaExcludes = {
		exclude group: 'org.apache.httpcomponents'
		exclude group: 'commons-io'
		exclude group: 'commons-logging'
		exclude group: 'commons-codec'
		exclude group: 'org.slf4j'
		exclude group: 'org.apache.logging.log4j' // MC ships log4j; youtube-source 'common' pulls log4j-slf4j2-impl
	}
	implementation('dev.arbjerg:lavaplayer:' + project.lavaplayer_version, lavaExcludes)
	implementation('dev.lavalink.youtube:v2:' + project.youtube_source_version, lavaExcludes)
	// jarJar (NeoForge jar-in-jar) does NOT expand transitives here (transitive=true is a no-op on this
	// config — verified via `gradle dependencies --configuration jarJar`). So embed the FULL lavaplayer +
	// youtube-source closure explicitly, each pinned to an exact version range. MC-provided libs
	// (httpclient/commons/slf4j/log4j) are deliberately NOT listed (MC supplies them; bundling = split-package crash).
	jarJar('dev.arbjerg:lavaplayer:[2.2.6]') { transitive = false }
	jarJar('dev.arbjerg:lavaplayer-natives:[2.2.6]') { transitive = false }
	jarJar('dev.arbjerg:lava-common:[2.2.6]') { transitive = false }
	jarJar('dev.lavalink.youtube:v2:[1.18.1]') { transitive = false }
	jarJar('dev.lavalink.youtube:common:[1.18.1]') { transitive = false }
	jarJar('org.mozilla:rhino-engine:[1.7.15]') { transitive = false }
	jarJar('org.mozilla:rhino:[1.7.15]') { transitive = false }
	jarJar('org.jsoup:jsoup:[1.16.1]') { transitive = false }
	jarJar('org.json:json:[20240303]') { transitive = false }
	jarJar('com.fasterxml.jackson.core:jackson-core:[2.15.2]') { transitive = false }
	jarJar('com.fasterxml.jackson.core:jackson-databind:[2.15.2]') { transitive = false }
	jarJar('com.fasterxml.jackson.core:jackson-annotations:[2.15.2]') { transitive = false }
	// ModDevGradle STRIPS jarJar from the dev run classpath -> put lava deps on every run's classpath so they load in runClient.
	additionalRuntimeClasspath('dev.arbjerg:lavaplayer:' + project.lavaplayer_version, lavaExcludes)
	additionalRuntimeClasspath('dev.lavalink.youtube:v2:' + project.youtube_source_version, lavaExcludes)

	// --- MediaPlayer: librespot-java (Spotify). COMPILE-ONLY: bundling at runtime fails on NeoForge's
	// securejar (kotlin-stdlib JPMS jdk7/jdk8 split-package). SpotifyPlayer compiles against this but is
	// INERT at runtime (try/catch); Spotify links fall back to the YouTube mirror (SpotifyResolver).
	compileOnly('xyz.gianlu.librespot:librespot-player:' + project.librespot_version) {
		exclude group: 'com.google.code.gson'
		exclude group: 'org.slf4j'
		exclude group: 'org.apache.logging.log4j'
		exclude group: 'org.jetbrains', module: 'annotations'
	}
}

java {
	toolchain.languageVersion = JavaLanguageVersion.of(21)
	withSourcesJar()
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 21
	it.options.encoding = 'UTF-8'
	it.options.compilerArgs.addAll(['-Xmaxerrs', '3000', '-Xmaxwarns', '50'])
}

// Expand ${mod_version} into the NeoForge mod metadata.
tasks.named('processResources', ProcessResources).configure {
	def replaceProperties = [mod_version: project.mod_version, minecraft_version: project.minecraft_version, neoforge_version: project.neoforge_version]
	inputs.properties replaceProperties
	filesMatching('META-INF/neoforge.mods.toml') {
		expand replaceProperties
	}
}
